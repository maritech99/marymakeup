<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M A R Y | Experience 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Tenor+Sans&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #050505;
            --gold: #D4AF37;
            --rose: #F4D0DC;
            --gray: #111111;
            --white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--black); 
            color: var(--white); 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- Header Estilo Concierge --- */
        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3rem, 12vw, 7rem);
            line-height: 0.8;
            letter-spacing: -3px;
            text-transform: uppercase;
        }

        h1 span { color: var(--gold); }

        .hero-subtitle {
            font-family: 'Tenor Sans', serif;
            letter-spacing: 10px;
            margin-top: 20px;
            color: var(--rose);
            font-size: 0.6rem;
            text-transform: uppercase;
        }

        .container { max-width: 500px; margin: auto; padding: 20px; }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            text-align: center;
            margin: 40px 0 25px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* --- Consola de Clima --- */
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .weather-btn {
            background: var(--gray);
            border: 1px solid rgba(212, 175, 55, 0.1);
            color: var(--white);
            padding: 20px 5px;
            border-radius: 15px;
            font-family: 'Syne', sans-serif;
            font-size: 0.6rem;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
        }

        .weather-btn.active {
            background: var(--gold);
            color: var(--black);
            transform: scale(0.95);
            border-color: var(--gold);
        }

        #weather-display {
            background: linear-gradient(145deg, #111, #080808);
            border-radius: 25px;
            padding: 30px;
            min-height: 180px;
            border: 1px solid rgba(255,255,255,0.03);
            margin-bottom: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* --- Botones de Información (Los que no son de juguete) --- */
        .info-stack {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .info-card {
            background: var(--gray);
            border: 1px solid rgba(244, 208, 220, 0.1);
            padding: 30px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .info-card:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
            background: #151515;
        }

        .info-card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-card .tag {
            font-size: 0.6rem;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: 800;
        }
